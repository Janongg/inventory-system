<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvenTrack — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0d0f14;
            --bg2:     #13161e;
            --bg3:     #1a1d27;
            --border:  #252836;
            --accent:  #6c63ff;
            --accent2: #a78bfa;
            --success: #10b981;
            --danger:  #ef4444;
            --text:    #e2e8f0;
            --muted:   #64748b;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; }
        .blob-2 { width: 400px; height: 400px; background: #a78bfa; bottom: -100px; right: -100px; }
        .blob-3 { width: 300px; height: 300px; background: #3b82f6; top: 50%; left: 50%; transform: translate(-50%,-50%); }

        /* Grid overlay */
        .grid-bg {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        .login-container {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px;
            padding: 16px;
        }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(167,139,250,0.2));
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }

        .login-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .login-sub {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            color: var(--muted); pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 12px 14px 12px 40px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
        }
        .form-input::placeholder { color: var(--muted); }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #8b83f7);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 13px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            letter-spacing: 0.02em;
            margin-top: 8px;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.35); }
        .btn-login:active { transform: none; }

        .alert {
            padding: 11px 15px;
            border-radius: 9px;
            margin-bottom: 18px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-danger  { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: var(--danger); }
        .alert-success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: var(--success); }

        .login-hint {
            text-align: center;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--muted);
        }
        .login-hint code {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 1px 6px;
            font-family: monospace;
            color: var(--accent2);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-bg"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-logo">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <rect x="2" y="2" width="11" height="11" rx="2" fill="#6c63ff"/>
                        <rect x="15" y="2" width="11" height="11" rx="2" fill="#a78bfa" opacity="0.7"/>
                        <rect x="2" y="15" width="11" height="11" rx="2" fill="#a78bfa" opacity="0.7"/>
                        <rect x="15" y="15" width="11" height="11" rx="2" fill="#6c63ff" opacity="0.4"/>
                    </svg>
                </div>
                <div class="login-title">InvenTrack</div>
                <div class="login-sub">Inventory Management System</div>
            </div>

            <div id="alertBox"></div>

            <form action="../backend/login.php" method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrap">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" name="username" class="form-input" placeholder="Enter username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" name="password" class="form-input" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In to Dashboard
                </button>
            </form>

            <div class="login-hint">
                Default credentials: <code>admin</code> / <code>admin123</code>
            </div>
        </div>
    </div>

    <script>
        // Show messages from URL params
        const params = new URLSearchParams(location.search);
        const alertBox = document.getElementById('alertBox');
        const error = params.get('error');
        const msg   = params.get('msg');

        if (error) {
            alertBox.innerHTML = `<div class="alert alert-danger">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                ${error}
            </div>`;
        } else if (msg === 'logged_out') {
            alertBox.innerHTML = `<div class="alert alert-success">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                You have been logged out successfully.
            </div>`;
        }
    </script>
</body>
</html>
